[package]
name = "but-graph"
version = "0.0.0"
edition.workspace = true
authors.workspace = true
description = "Types to represent Git commit graphs as connected segments, and perform various operations on these."
publish = false
rust-version.workspace = true

[lib]
doctest = false

[features]
## Gate functions we only need to help `gitbutler-` crates along,
## slated for culling or review before promotion to non-legacy
legacy = []

[dependencies]
but-core.workspace = true

gix = { workspace = true, features = ["revision"] }
bstr.workspace = true
petgraph.workspace = true
anyhow.workspace = true
bitflags.workspace = true
boolean-enums.workspace = true
tracing.workspace = true
itertools.workspace = true

[dev-dependencies]
but-graph = { path = ".", features = ["legacy"] }
but-meta = { workspace = true, features = ["legacy"] }
but-testsupport.workspace = true

gitbutler-reference.workspace = true
insta = "1.47.2"

[lints]
workspace = true
