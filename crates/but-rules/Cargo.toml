but-ctx.workspace = true

anyhow.workspace = true
itertools.workspace = true
serde.workspace = true
regex = { workspace = true, features = ["perf"] }
gix = { workspace = true }
chrono.workspace = true
serde_regex = "1.1.0"
serde_json.workspace = true
uuid.workspace = true

[lints]
workspace = true
