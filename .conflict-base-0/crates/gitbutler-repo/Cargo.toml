[package]
name = "gitbutler-repo"
version = "0.0.0"
edition.workspace = true
authors.workspace = true
publish = false
rust-version.workspace = true

[lib]
doctest = false

[dependencies]
but-core = { workspace = true, features = ["legacy"] }
but-gerrit.workspace = true
but-oxidize.workspace = true
but-ctx = { workspace = true, features = ["legacy"] }

gitbutler-project.workspace = true
gitbutler-reference.workspace = true
gitbutler-cherry-pick.workspace = true

git2.workspace = true
git2-hooks.workspace = true
gix = { workspace = true, features = ["merge", "status", "tree-editor"] }
anyhow.workspace = true
bstr.workspace = true
tracing.workspace = true
tempfile.workspace = true
serde.workspace = true
itertools.workspace = true
toml.workspace = true
base64 = "0.22.1"
infer = "0.19.0"
scopeguard = "1.2.0"
fuzzy-matcher = "0.3.7"
ignore = "0.4.25"

[dev-dependencies]
but-testsupport.workspace = true
gitbutler-user.workspace = true
but-settings.workspace = true
serde_json = { workspace = true, features = ["arbitrary_precision"] }
snapbox.workspace = true
keyring.workspace = true

[lints]
workspace = true
